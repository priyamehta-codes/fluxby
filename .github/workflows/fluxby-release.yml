name: 'Fluxby Release'
description: 'Builds, tags, and publishes a new Fluxby release when a version tag (v*) is pushed. Do not run manually.'

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Initialize and generate changelog
  initialize-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      version: ${{ steps.get-version.outputs.version }}
      dry_run: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current and target version
        id: get-version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "Error: No version provided and not triggered by tag."
            exit 1
          fi

      - name: Update versions and metadata (Manual Trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"

          # Update package.json files
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" apps/tauri/package.json

          # Update tauri.conf.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" apps/tauri/tauri.conf.json

          echo "Updated versions to $VERSION"

      - name: Update UpdatesContent.tsx
        id: update-updates
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          VERSION_KEY=$(echo "$VERSION" | tr -d '.')
          DATE=$(date +"%d %B %Y" | sed 's/January/januari/;s/February/februari/;s/March/maart/;s/April/april/;s/May/mei/;s/June/juni/;s/July/juli/;s/August/augustus/;s/September/september/;s/October/oktober/;s/November/november/;s/December/december/')

          FILE="apps/landing/src/pages/legal/UpdatesContent.tsx"

          if grep -q "version: '${VERSION}'" "$FILE"; then
            echo "Version $VERSION already exists in UpdatesContent.tsx"
          else
            # Create new release entry
            NEW_ENTRY="    {
                  version: '${VERSION}',
                  date: updatesPage?.v${VERSION_KEY}Date || '${DATE}',
                  title: updatesPage?.v${VERSION_KEY}Title || 'Release ${VERSION}',
                  description:
                    updatesPage?.v${VERSION_KEY}Description ||
                    'Zie de release notes voor alle wijzigingen.',
                  features: [],
                },"

            # Insert after "const releases = ["
            sed -i "s/const releases = \[/const releases = [\n${NEW_ENTRY}/" "$FILE"
            echo "Updated UpdatesContent.tsx"
          fi

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Get previous tag
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Triggered by tag push: we are ON the tag, so we need the one before it
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          else
            # Triggered by other means: get the latest tag
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          fi

          if [ -n "$PREV_TAG" ]; then
            REVISION_RANGE="${PREV_TAG}..HEAD"
          else
            REVISION_RANGE="HEAD"
          fi

          echo "Generating changelog for range: $REVISION_RANGE"

          {
            echo "## What's Changed"
            echo ""
            
            # Features
            FEATURES=$(git log $REVISION_RANGE --oneline --no-merges --grep="^feat" --format="- %s" 2>/dev/null | sed 's/^- feat(\([^)]*\)): /- **\1:** /' | sed 's/^- feat: /- /')
            if [ -n "$FEATURES" ]; then
              echo "### ✨ Features"
              echo ""
              echo "$FEATURES"
              echo ""
            fi
            
            # Bug fixes
            FIXES=$(git log $REVISION_RANGE --oneline --no-merges --grep="^fix" --format="- %s" 2>/dev/null | sed 's/^- fix(\([^)]*\)): /- **\1:** /' | sed 's/^- fix: /- /')
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo ""
              echo "$FIXES"
              echo ""
            fi
            
            # Performance
            PERF=$(git log $REVISION_RANGE --oneline --no-merges --grep="^perf" --format="- %s" 2>/dev/null | sed 's/^- perf(\([^)]*\)): /- **\1:** /' | sed 's/^- perf: /- /')
            if [ -n "$PERF" ]; then
              echo "### ⚡ Performance"
              echo ""
              echo "$PERF"
              echo ""
            fi

            # Refactoring
            REFACTOR=$(git log $REVISION_RANGE --oneline --no-merges --grep="^refactor" --format="- %s" 2>/dev/null | sed 's/^- refactor(\([^)]*\)): /- **\1:** /' | sed 's/^- refactor: /- /')
            if [ -n "$REFACTOR" ]; then
              echo "### 🛠️ Refactoring"
              echo ""
              echo "$REFACTOR"
              echo ""
            fi

            # Documentation
            DOCS=$(git log $REVISION_RANGE --oneline --no-merges --grep="^docs" --format="- %s" 2>/dev/null | sed 's/^- docs(\([^)]*\)): /- **\1:** /' | sed 's/^- docs: /- /')
            if [ -n "$DOCS" ]; then
              echo "### 📝 Documentation"
              echo ""
              echo "$DOCS"
              echo ""
            fi

            # Chores
            CHORE=$(git log $REVISION_RANGE --oneline --no-merges --grep="^chore" --format="- %s" 2>/dev/null | sed 's/^- chore(\([^)]*\)): /- **\1:** /' | sed 's/^- chore: /- /')
            if [ -n "$CHORE" ]; then
              echo "### 🧹 Chores"
              echo ""
              echo "$CHORE"
              echo ""
            fi

            # Styles
            STYLES=$(git log $REVISION_RANGE --oneline --no-merges --grep="^style" --format="- %s" 2>/dev/null | sed 's/^- style(\([^)]*\)): /- **\1:** /' | sed 's/^- style: /- /')
            if [ -n "$STYLES" ]; then
              echo "### 🎨 Styles"
              echo ""
              echo "$STYLES"
              echo ""
            fi

            # Tests
            TESTS=$(git log $REVISION_RANGE --oneline --no-merges --grep="^test" --format="- %s" 2>/dev/null | sed 's/^- test(\([^)]*\)): /- **\1:** /' | sed 's/^- test: /- /')
            if [ -n "$TESTS" ]; then
              echo "### 🧪 Tests"
              echo ""
              echo "$TESTS"
              echo ""
            fi
          } > changelog_body.md

          # Store changelog as output (for backwards compatibility)
          {
            echo 'changelog<<EOF'
            cat changelog_body.md
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: changelog_body.md
          retention-days: 1

      - name: Generate API Assets
        run: |
          npm ci
          npm run generate:api

      - name: Commit, Tag and Push (Manual Trigger only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true'
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore(release): v${VERSION} [skip ci]"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"

          git push origin main
          git push origin "v${VERSION}"
          echo "Committed, tagged and pushed version $VERSION"

  # Step 2: Create release with changelog
  create-release:
    needs: initialize-release
    if: needs.initialize-release.outputs.dry_run != 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download changelog artifact
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: Read changelog
        id: read-changelog
        run: |
          CHANGELOG=$(cat changelog_body.md)
          echo "Changelog content:"
          cat changelog_body.md

      - name: Build release body with downloads table
        id: build-body
        run: |
          VERSION="${{ needs.initialize-release.outputs.version }}"
          cat changelog_body.md > release_body.md
          cat >> release_body.md << EOF

          ---

          ## Downloads

          | Platform | Download |
          |----------|----------|
          | Windows | [Fluxby_${VERSION}_x64-setup.exe](https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Fluxby_${VERSION}_x64-setup.exe) |
          | macOS (Intel) | [Fluxby_${VERSION}_x64.dmg](https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Fluxby_${VERSION}_x64.dmg) |
          | macOS (Apple Silicon) | [Fluxby_${VERSION}_aarch64.dmg](https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Fluxby_${VERSION}_aarch64.dmg) |
          | Linux (AppImage) | [fluxby_${VERSION}_amd64.AppImage](https://github.com/${{ github.repository }}/releases/download/v${VERSION}/fluxby_${VERSION}_amd64.AppImage) |
          | Linux (Debian) | [fluxby_${VERSION}_amd64.deb](https://github.com/${{ github.repository }}/releases/download/v${VERSION}/fluxby_${VERSION}_amd64.deb) |
          EOF

      - name: Create release
        id: create-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.initialize-release.outputs.version }}
          name: Fluxby v${{ needs.initialize-release.outputs.version }}
          draft: true
          prerelease: false
          body_path: release_body.md

  # Step 3: Build for all platforms
  build-tauri:
    needs: [initialize-release, create-release]
    if: needs.initialize-release.outputs.dry_run != 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust-target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust-target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            rust-target: ''
          - platform: 'windows-latest'
            args: ''
            rust-target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.initialize-release.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install dependencies
        run: npm ci

      - name: Build dependencies
        run: |
          npm run build -w packages/shared
          npm run build -w packages/database
          npm run build -w packages/core
          npm run build -w apps/web

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          projectPath: apps/tauri
          args: ${{ matrix.args }}

  # Step 4: Publish the release
  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [initialize-release, create-release, build-tauri]
    if: needs.initialize-release.outputs.dry_run != 'true'
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }} \
            -f draft=false \
            -f make_latest=true
