name: Deploy to GitHub Pages
# Builds and deploys the Fluxby web and landing apps to GitHub Pages on every push to main.
#
# IMPORTANT: To prevent the README from showing during deployments, ensure your repository's
# GitHub Pages settings are configured as follows:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
# Do NOT use "Deploy from a branch" as that would serve the repository root (including README.md)
# during the deployment process.

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'apps/landing/**'
      - 'packages/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  # IMPORTANT: Don't cancel in-progress deployments to prevent showing README
  # during the transition. Wait for current deployment to finish instead.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build GitHub Pages site
        run: npm run build:pages
        # No VITE_BASE_URL needed - custom domain (fluxby.app) serves from root /

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
