name: Deploy to GitHub Pages
# Builds and deploys the Fluxby web and landing apps to GitHub Pages on every push to main.
#
# ============================================================================
# IMPORTANT: GitHub Pages Source Configuration
# ============================================================================
# To prevent the README from showing when deployments fail, your repository's
# GitHub Pages settings MUST be configured as:
#
#   Repository → Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# ⚠️  Do NOT use "Deploy from a branch" - this causes GitHub to serve the
#     repository root (including README.md) as a fallback when no deployment exists.
#
# With "GitHub Actions" as the source:
# - Only successful workflow deployments update the live site
# - Failed builds leave the previous deployment intact
# - There is no fallback to repository content
# ============================================================================
#
# SAFETY: If the build fails, the currently deployed site remains unchanged.
# GitHub Pages deployment is atomic - the new site is only deployed if ALL build steps succeed.

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'apps/landing/**'
      - 'packages/**'
      - '.github/workflows/deploy-pages.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  # IMPORTANT: Don't cancel in-progress deployments to prevent showing README
  # during the transition. Wait for current deployment to finish instead.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build:packages

      - name: Lint check
        run: npm run lint
        continue-on-error: false

      - name: Type check landing page
        run: npm run typecheck -w apps/landing
        continue-on-error: false

      - name: Build GitHub Pages site
        run: npm run build:pages
        # No VITE_BASE_URL needed - custom domain (fluxby.app) serves from root /

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
