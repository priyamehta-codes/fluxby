<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="body" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </radialGradient>
    <radialGradient id="belly" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </radialGradient>
  </defs>

  <!-- Simple round fluffy body -->
  <circle cx="50" cy="52" r="40" fill="url(#body)"/>

  <!-- Ears -->
  <circle cx="22" cy="22" r="14" fill="url(#body)"/>
  <circle cx="78" cy="22" r="14" fill="url(#body)"/>
  <circle cx="22" cy="22" r="7" fill="#DDD6FE"/>
  <circle cx="78" cy="22" r="7" fill="#DDD6FE"/>

  <!-- Belly -->
  <ellipse cx="50" cy="58" rx="22" ry="20" fill="url(#belly)"/>

  <!-- Eyes -->
  <ellipse cx="38" cy="45" rx="6" ry="7" fill="white"/>
  <ellipse cx="62" cy="45" rx="6" ry="7" fill="white"/>
  <circle cx="40" cy="46" r="3" fill="#1E1B4B"/>
  <circle cx="64" cy="46" r="3" fill="#1E1B4B"/>
  <circle cx="41" cy="44" r="1.5" fill="white"/>
  <circle cx="65" cy="44" r="1.5" fill="white"/>

  <!-- Nose -->
  <ellipse cx="50" cy="54" rx="3" ry="2" fill="#7C3AED"/>

  <!-- Smile -->
  <path d="M 44 60 Q 50 65, 56 60" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>

  <!-- Piggy bank slot on top -->
  <rect x="45" y="15" width="10" height="8" rx="2" fill="#FBBF24" stroke="#F59E0B" stroke-width="1"/>
  <rect x="47" y="17" width="6" height="4" rx="1" fill="#92400E"/>

  <!-- Coin dropping into slot (half visible) -->
  <circle cx="50" cy="25" r="8" fill="#FBBF24" stroke="#F59E0B" stroke-width="1"/>
  <text x="50" y="29" text-anchor="middle" fill="#92400E" font-size="10" font-weight="bold" font-family="Arial">€</text>
  <!-- Mask to hide bottom half of coin -->
  <rect x="42" y="25" width="16" height="8" fill="url(#body)"/>
</svg>
